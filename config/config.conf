# Configurazione di "Ricordati che devi cambiare la password".
# Formato: KEY=value (sintassi compatibile con bash).
# Per aggiungere nuove opzioni in futuro è sufficiente aggiungere righe qui.

# Giorni di preavviso prima della scadenza. Il periodo viene suddiviso
# automaticamente in 5 livelli equidistanti.
WARNING_DAYS=10

# true  = mostra la notifica a ogni controllo giornaliero
# false = mostra la notifica solo quando il livello di urgenza aumenta
SHOW_NOTIFICATION_EVERY_DAY=true

# Notifica sonora per il livello massimo (richiede paplay).
# Se SOUND_FILE è vuoto viene usato un suono di sistema, se disponibile.
PLAY_SOUND=true
SOUND_FILE=

# Guida Markdown mostrata con `--guide`. Se vuoto viene usata quella di default.
GUIDE_FILE=

# Icona della notifica.
NOTIFICATION_ICON=dialog-warning

# Messaggi dei 5 livelli. %s viene sostituito con i giorni mancanti.
LV1_MESSAGE="La password scadrà tra %s giorni, mi raccomando di cambiarla in tempo"
LV2_MESSAGE="La password scadrà tra %s giorni, mi raccomando di cambiarla in tempo"
LV3_MESSAGE="La password scadrà tra %s giorni, se non la cambi in tempo sarà un casino non potrai accedere"
LV4_MESSAGE="ATTENZIONE: La password scadrà tra %s giorni. CAMBIALA, FOLLE!!"
LV5_MESSAGE="URGENZA: LA PASSWORD SCADRÀ TRA %s GIORNI, CAMBIALA IMMEDIATAMENTE O SARÀ UN INFERNO"
